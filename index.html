<script>
var stories=[{"id":1,"title":"朱德的扁担","summary":"朱德同志与战士们同甘共苦，亲自挑粮上山的感人故事","content":"1928年，井冈山革命根据地处于敌人的严密封锁之中，红军的生活极其艰苦。为了解决部队的粮食问题，红军战士们不得不从山下的宁冈、永新等地挑粮上山。\n\n当时，朱德已经四十多岁了，身为红军军长，完全可以不用参加挑粮。但朱德坚持与战士们同甘共苦，每次挑粮都走在队伍的最前面。战士们心疼他，常常把他的扁担藏起来，想让他休息一下。\n\n朱德发现扁担不见了，并没有生气，而是又做了一根新的扁担，并在上面刻下了\"朱德的扁担\"五个字。他说：\"革命就是要吃苦，我怎么能搞特殊呢？\"\n\n从此，\"朱德的扁担\"成为红军官兵一致、同甘共苦的象征，激励着一代又一代的革命者。\n\n这个故事告诉我们，领导干部要以身作则，与群众打成一片，才能真正赢得群众的信任和支持。朱德的扁担精神，是井冈山精神的重要组成部分，体现了共产党人的优良作风和高尚品格。","references":[{"title":"朱德的扁担 - 百度百科","url":"https://baike.baidu.com/item/%E6%9C%B1%E5%BE%B7%E7%9A%84%E6%89%81%E6%8B%85/165177"},{"title":"井冈山革命博物馆 - 官方网站","url":"https://www.jgsgmbwg.com/index"},{"title":"党指挥枪的由来 - 人民网军事频道","url":"http://military.people.com.cn/n1/2017/0625/c1011-29360503.html"}]},{"id":2,"title":"井冈山的红米饭","summary":"红军战士以红米饭、南瓜汤为食，在艰苦环境中坚守革命信念","content":"红米饭、南瓜汤，秋茄子、味好香，餐餐吃得精打光。\n\n这首在井冈山广泛流传的歌谣，真实地反映了当年红军战士的生活状况。由于敌人的经济封锁，井冈山根据地物资极度匮乏，红军战士的主食主要是红米和南瓜。\n\n红米是一种粗糙的稻米，口感远不如白米，但红军战士们却吃得津津有味。毛泽东曾在《井冈山的斗争》中写道：\"红军的物质生活如此菲薄，战斗如此频繁，仍能维持不敝，除党的作用外，就是靠实行军队内的民主主义。\"\n\n在艰苦的环境中，红军战士们不仅没有抱怨，反而以苦为乐，编唱了这首脍炙人口的\"红米饭\"歌谣。这种革命乐观主义精神，成为井冈山精神的重要组成部分。\n\n今天，红米饭南瓜汤已成为井冈山的特色美食，吸引着众多游客前来品尝。它不仅是一种美食，更是一段历史的记忆，一种精神的传承。","references":[{"title":"保持艰苦奋斗的前行姿态 - 新华网","url":"http://www.xinhuanet.com/politics/2018-07/26/c_1123179040.htm"},{"title":"井冈山精神 - 百度百科","url":"https://baike.baidu.com/item/%E4%BA%95%E5%86%88%E5%B1%B1%E7%B2%BE%E7%A5%9E/86041"},{"title":"中共六大与井冈山革命斗争 - 人民网党史","url":"http://dangshi.people.com.cn/n1/2018/0606/c85037-30038943.html"}]},{"id":3,"title":"黄洋界保卫战","summary":"红军以不足一个营的兵力，击退敌军四个团的进攻","content":"1928年8月30日，湘赣两省敌军共四个团的兵力，乘毛泽东、朱德率红军主力外出之际，向井冈山根据地发动进攻，企图一举摧毁这个新生的红色政权。\n\n当时，守卫黄洋界哨口的红军只有第三十一团第一营的两个连，不足百人，敌我力量对比极为悬殊。但在团长朱云卿、党代表何挺颖的指挥下，红军战士凭借天险，沉着应战。\n\n战斗中，红军将一门迫击炮抬上山顶，虽然只有三发炮弹，但前两发因受潮未响，第三发准确击中敌军指挥部。敌军以为红军主力已经回师，顿时惊慌失措，连夜撤退。\n\n毛泽东得知黄洋界保卫战的胜利后，挥笔写下了《西江月·井冈山》：\n\n\"山下旌旗在望，山头鼓角相闻。敌军围困万千重，我自岿然不动。早已森严壁垒，更加众志成城。黄洋界上炮声隆，报道敌军宵遁。\"\n\n黄洋界保卫战，是红军以少胜多的经典战例，充分展示了人民战争的巨大威力。它证明了只要坚持党的领导，发动群众，依靠群众，就能够战胜任何强大的敌人。","references":[{"title":"黄洋界保卫战 - 百度百科","url":"https://baike.baidu.com/item/%E9%BB%84%E6%B4%8B%E7%95%8C%E4%BF%9D%E5%8D%AB%E6%88%98/466945"},{"title":"讲好\"四座山\"的故事 弘扬井冈山精神 - 人民网","url":"http://dangshi.people.com.cn/n1/2021/0524/c436982-32111450.html"},{"title":"井冈山革命博物馆 - 官方网站","url":"https://www.jgsgmbwg.com/index"}]},{"id":4,"title":"三湾改编","summary":"确立党对军队的绝对领导，奠定新型人民军队的基础","content":"1927年9月29日，毛泽东率领秋收起义部队到达江西省永新县三湾村。此时，部队经过长途跋涉和战斗，减员严重，士气低落。\n\n为了巩固这支新生的革命军队，毛泽东在三湾主持召开了前敌委员会会议，决定对部队进行改编。三湾改编的核心内容包括：\n\n第一，缩编部队，将原来的一个师缩编为一个团，去弱留强，提高战斗力。\n\n第二，确立党对军队的绝对领导，在连队设立党支部，班排设党小组，营团设党委。这是建设新型人民军队的根本性措施，\"支部建在连上\"成为人民军队的组织原则。\n\n第三，实行军队内部的民主制度，连以上建立士兵委员会，实行官兵平等，经济公开，废除旧军队的军阀作风。\n\n三湾改编，从组织上确立了党对军队的绝对领导，奠定了新型人民军队的基础，是中国共产党建设新型人民军队的重要开端。\n\n毛泽东后来总结道：\"红军所以艰难奋战而不溃散，'支部建在连上'是一个重要原因。\"","references":[{"title":"三湾改编 - 百度百科","url":"https://baike.baidu.com/item/%E4%B8%89%E6%B9%BE%E6%94%B9%E7%BC%96/467285"},{"title":"早期革命根据地及主要创建者 - 人民网","url":"http://dangshi.people.com.cn/n1/2021/0609/c436975-32126031.html"},{"title":"党指挥枪的由来 - 人民网军事频道","url":"http://military.people.com.cn/n1/2017/0625/c1011-29360503.html"}]},{"id":5,"title":"八角楼的灯光","summary":"毛泽东在八角楼昏暗的油灯下，写下照亮革命道路的著作","content":"在井冈山茅坪村，有一座古朴的八角楼。1927年10月至1929年1月，毛泽东经常在这里居住和办公。\n\n当时，根据地的生活条件极其艰苦，连点灯用的油都十分紧缺。为了节约用油，毛泽东规定，各级机关晚上办公时，只能点一盏灯，且只能用一根灯芯。\n\n就是在这样昏暗的灯光下，毛泽东夜以继日地工作，写下了《中国的红色政权为什么能够存在？》《井冈山的斗争》等光辉著作。\n\n在《中国的红色政权为什么能够存在？》中，毛泽东深刻分析了中国的国情，论证了红色政权能够存在和发展的原因和条件，提出了\"工农武装割据\"的思想，为中国革命指明了正确的道路。\n\n八角楼的灯光，虽然微弱，却照亮了中国革命前进的方向。它告诉我们，在困难面前，只要坚持学习、坚持思考、坚持探索，就能够找到解决问题的办法。\n\n今天，八角楼已成为井冈山的重要景点，每年都有大批游客前来参观，感受那段艰苦岁月中共产党人追求真理的精神。","references":[{"title":"八角楼 - 百度百科","url":"https://baike.baidu.com/item/%E5%85%AB%E8%A7%92%E6%A5%BC/759148"},{"title":"井冈山革命博物馆 - 官方网站","url":"https://www.jgsgmbwg.com/index"},{"title":"井冈山下的红色青春 - 新华网","url":"http://www.xinhuanet.com/politics/2016-07/25/c_1119275390.htm"}]},{"id":6,"title":"井冈山革命根据地的创建","summary":"毛泽东率领秋收起义部队上井冈山，创建第一个农村革命根据地","content":"1927年10月，毛泽东率领秋收起义部队到达井冈山，开始创建中国第一个农村革命根据地。这一重大战略决策，开创了中国革命的新道路。\n\n井冈山位于湘赣边界，山高林密，地势险要，易守难攻，是建立革命根据地的理想之地。毛泽东在这里与当地农民武装首领袁文才、王佐取得联系，争取他们的支持，逐步建立起以宁冈为中心的井冈山革命根据地。\n\n1928年4月，朱德、陈毅率领南昌起义余部和湘南农军到达井冈山，与毛泽东率领的部队胜利会师，成立工农革命军第四军（后改称红四军）。井冈山革命根据地进入发展壮大阶段。\n\n井冈山革命根据地的创建，是中国革命从城市转向农村的重大转折，标志着中国革命找到了一条适合本国国情的新道路——农村包围城市、武装夺取政权的道路。\n\n毛泽东在井冈山的实践，为中国共产党探索中国革命道路提供了宝贵的经验，成为中国革命胜利的重要基石。","references":[{"title":"井冈山革命根据地 - 百度百科","url":"https://baike.baidu.com/item/%E4%BA%95%E5%86%88%E5%B1%B1%E9%9D%A9%E5%91%BD%E6%A0%B9%E6%8D%AE%E5%9C%B0/464489"},{"title":"井冈山会师星星之火成燎原之势 - 人民网","url":"http://dangshi.people.com.cn/GB/n1/2017/0918/c85037-29542044.html"},{"title":"袁文才、王佐:从绿林好汉到红军将领 - 新华网","url":"http://www.xinhuanet.com/politics/2018-06/22/c_1123021585.htm"}]},{"id":7,"title":"龙源口大捷","summary":"井冈山斗争时期最大的一次胜利，歼敌一个团，击溃两个团","content":"1928年6月23日，湘赣两省敌军向井冈山革命根据地发动第四次\"会剿\"。红四军在朱德、毛泽东的指挥下，在龙源口地区与敌军展开激战。\n\n战斗中，红四军采取\"避强击弱\"的战术，集中兵力打击战斗力较弱的赣敌。王尔琢率领第二十八团担任主攻任务，英勇作战，歼敌一个团，击溃两个团。\n\n龙源口战斗是井冈山斗争时期最大的一次胜利，共歼敌千余人，缴获枪支数百。这次胜利极大地鼓舞了根据地军民的士气，巩固和发展了井冈山革命根据地。\n\n战斗中涌现出许多英雄人物。王尔琢团长身先士卒，指挥果断；红军战士英勇顽强，不怕牺牲。他们用鲜血和生命捍卫了新生的红色政权。\n\n龙源口大捷的胜利，证明了红军是一支能够战胜强大敌人的革命军队，也证明了毛泽东、朱德的军事指挥艺术。这次胜利，为井冈山革命根据地的巩固和发展奠定了坚实基础。","references":[{"title":"龙源口战斗 - 百度百科","url":"https://baike.baidu.com/item/%E9%BE%99%E6%BA%90%E5%8F%A3%E6%88%98%E6%96%97/12640968"},{"title":"致我深爱的中国——烈士遗书的故事 - 人民网","url":"http://dangshi.people.com.cn/GB/146570/428054/"}]},{"id":8,"title":"红军的群众工作","summary":"红军严格执行群众纪律，赢得人民群众的拥护和支持","content":"在井冈山斗争时期，红军高度重视群众工作，把发动群众、依靠群众作为革命胜利的重要保证。\n\n毛泽东为红军制定了严格的群众纪律，提出了\"三大纪律、六项注意\"（后来发展为\"三大纪律、八项注意\"）：\n\n三大纪律：一切行动听指挥；不拿群众一针一线；一切缴获要归公。\n\n六项注意：上门板；捆铺草；说话和气；买卖公平；借东西要还；损坏东西要赔。\n\n红军严格执行这些纪律，做到\"不拿群众一针一线\"，与人民群众建立了深厚的感情。红军战士帮助群众挑水、劈柴、收割庄稼，群众则积极支援红军，为红军送情报、送粮食、救治伤员。\n\n在井冈山，红军还开展了土地革命，没收地主土地分配给农民，使广大农民获得了土地，翻身做主人。这一政策极大地调动了群众的革命积极性。\n\n正是因为有了人民群众的拥护和支持，井冈山革命根据地才能在敌人的重重包围中生存和发展。红军与人民群众的血肉联系，是井冈山革命根据地存在和发展的根基。","references":[{"title":"三大纪律八项注意 - 百度百科","url":"https://baike.baidu.com/item/%E4%B8%89%E5%A4%A7%E7%BA%AA%E5%BE%8B%E5%85%AB%E9%A1%B9%E6%B3%A8%E6%84%8F/1470830"},{"title":"人民军队为何雷锋多 - 新华网","url":"http://www.xinhuanet.com/mil/2015-06/19/c_127932996_2.htm"},{"title":"井冈山革命博物馆 - 官方网站","url":"https://www.jgsgmbwg.com/index"}]},{"id":9,"title":"小井红军医院","summary":"红军在井冈山创办的第一所正规医院，救治了大批伤员","content":"1928年10月，红四军在井冈山小井村创办了红军医院，这是红军创办的第一所正规医院。\n\n医院建在一座简陋的木屋里，有100多个床位。由于医疗条件极其艰苦，医院缺少药品、医疗器械和专业医生。红军医务人员用竹片代替镊子，用盐水代替消毒液，用草药代替西药，想尽一切办法救治伤员。\n\n在医院工作的医务人员中，有许多是女同志。曾志当时担任医院党总支书记，带领医护人员日夜奋战，救治伤员。她们不畏艰苦，不怕牺牲，用自己实际行动诠释了共产党人的初心和使命。\n\n1929年1月，敌军偷袭小井红军医院，医院被烧毁，130多名重伤员和医务人员惨遭杀害。他们用生命捍卫了革命事业，成为井冈山斗争中英勇牺牲的烈士。\n\n今天，小井红军医院旧址已成为井冈山的重要纪念地，每年都有大批游客前来瞻仰，缅怀那些为革命献出生命的医护人员和伤员。","references":[{"title":"小井红军医院 - 百度百科","url":"https://baike.baidu.com/item/%E5%B0%8F%E4%BA%95%E7%BA%A2%E5%86%9B%E5%8C%BB%E9%99%A2/20636104"},{"title":"井冈山下的红色青春 - 新华网","url":"http://www.xinhuanet.com/politics/2016-07/25/c_1119275390.htm"},{"title":"井冈山革命博物馆 - 官方网站","url":"https://www.jgsgmbwg.com/index"}]},{"id":10,"title":"井冈山精神的内涵","summary":"坚定信念、艰苦奋斗、实事求是、敢闯新路、依靠群众、勇于胜利","content":"井冈山精神是中国共产党在井冈山斗争时期形成的宝贵精神财富，其核心内涵是：坚定信念、艰苦奋斗、实事求是、敢闯新路、依靠群众、勇于胜利。\n\n坚定信念：井冈山斗争时期，面对敌人的围剿和艰苦的生活条件，共产党人和红军战士始终坚定革命信念，坚信革命必定胜利。这种坚定的信念，是井冈山斗争取得胜利的精神支柱。\n\n艰苦奋斗：在物资匮乏的条件下，红军战士吃红米饭、穿草鞋、住茅屋，以苦为乐，艰苦奋斗。朱德挑粮上山，毛泽东一根灯芯办公，都体现了艰苦奋斗的精神。\n\n实事求是：毛泽东在井冈山深入调查研究，分析中国国情，探索中国革命道路，提出了\"工农武装割据\"的思想，体现了实事求是的精神。\n\n敢闯新路：井冈山革命根据地的创建，是中国革命从城市转向农村的重大创新，开创了农村包围城市、武装夺取政权的崭新道路。\n\n依靠群众：红军严格执行群众纪律，发动群众，依靠群众，建立了红军与人民群众的血肉联系。\n\n勇于胜利：面对强大的敌人，红军敢于斗争，敢于胜利，以少胜多，取得了一个又一个胜利。\n\n井冈山精神是中国共产党人精神谱系的重要组成部分，至今仍然具有重要的时代价值。","references":[{"title":"井冈山精神 - 百度百科","url":"https://baike.baidu.com/item/%E4%BA%95%E5%86%88%E5%B1%B1%E7%B2%BE%E7%A5%9E/86041"},{"title":"讲好\"四座山\"的故事 弘扬井冈山精神 - 人民网","url":"http://dangshi.people.com.cn/n1/2021/0524/c436982-32111450.html"},{"title":"井冈山大学 - 官方网站","url":"https://www.jgsu.edu.cn/"}]}];

/gcore.jsdelivr.net/gh/XiaoWang52037/jinggangshan@main/uploads/memes/1783600343086-611679994.jpg","description":"","historyBackground":""},{"id":13,"title":"上课啦","img":"https://gcore.jsdelivr.net/gh/XiaoWang52037/jinggangshan@main/uploads/memes/1783600354285-846389128.jpg","description":"","historyBackground":""},{"id":14,"title":"胜利","img":"https://gcore.jsdelivr.net/gh/XiaoWang52037/jinggangshan@main/uploads/memes/1783600363039-939381445.jpg","description":"","historyBackground":""},{"id":15,"title":"为中华之崛起而读书","img":"https://gcore.jsdelivr.net/gh/XiaoWang52037/jinggangshan@main/uploads/memes/1783600371698-411924274.jpg","description":"","historyBackground":""},{"id":16,"title":"星星之火 可以燎原","img":"https://gcore.jsdelivr.net/gh/XiaoWang52037/jinggangshan@main/uploads/memes/1783600379125-729146855.jpg","description":"","historyBackground":""},{"id":17,"title":"行军不忘恤民、红军助乡亲","img":"https://gcore.jsdelivr.net/gh/XiaoWang52037/jinggangshan@main/uploads/memes/1783600395254-584906611.jpg","description":"","historyBackground":""},{"id":18,"title":"学思想 强信念","img":"https://gcore.jsdelivr.net/gh/XiaoWang52037/jinggangshan@main/uploads/memes/1783600405656-275454928.jpg","description":"","historyBackground":""}];

var figures=[{"id":1,"name":"毛泽东","photoUrl":"https://gcore.jsdelivr.net/gh/XiaoWang52037/jinggangshan@main/uploads/figures/1783600584039-335673977.jpg","title":"井冈山革命根据地主要创始人","biography":"毛泽东（1893-1976），湖南湘潭人。伟大的马克思主义者，伟大的无产阶级革命家、战略家、理论家，中国共产党、中国人民解放军和中华人民共和国的主要缔造者和领导人。","jinggangshanStory":"1927年10月，毛泽东率领秋收起义部队到达井冈山，开始创建中国第一个农村革命根据地。他深入调查研究，分析中国国情，提出了\"工农武装割据\"的思想，为中国革命找到了一条农村包围城市、武装夺取政权的正确道路。\n\n在井冈山期间，毛泽东进行了三湾改编，确立了党对军队的绝对领导，\"支部建在连上\"成为人民军队的组织原则。他还主持制定了红军的群众纪律，提出了\"三大纪律、六项注意\"，使红军成为一支新型的人民军队。\n\n毛泽东在八角楼昏暗的油灯下，写下了《中国的红色政权为什么能够存在？》《井冈山的斗争》等重要著作，从理论上阐明了红色政权存在和发展的条件，指导了中国革命实践。\n\n1928年4月，朱德、陈毅率领南昌起义余部和湘南农军到达井冈山，与毛泽东领导的部队胜利会师，成立工农革命军第四军。井冈山革命根据地进入发展壮大阶段。\n\n毛泽东在井冈山的实践，为中国共产党探索中国革命道路提供了宝贵经验，成为中国革命胜利的重要基石。"},{"id":2,"name":"朱德","photoUrl":"https://gcore.jsdelivr.net/gh/XiaoWang52037/jinggangshan@main/uploads/figures/1783600575784-244426665.jpg","title":"红四军军长","biography":"朱德（1886-1976），四川仪陇人。伟大的马克思主义者，伟大的无产阶级革命家、军事家、政治家，中国人民解放军的主要缔造者之一，中华人民共和国开国元勋。","jinggangshanStory":"1928年4月，朱德与陈毅率领南昌起义余部和湘南农军到达井冈山，与毛泽东领导的部队胜利会师。两军会师后，成立工农革命军第四军（后改称红四军），朱德任军长，毛泽东任党代表。\n\n在井冈山斗争时期，朱德以身作则，与战士同甘共苦。他虽已年过四十，仍坚持参加挑粮上山。战士们心疼他，把他的扁担藏起来，朱德就新做一根，并在上面刻上\"朱德的扁担\"五个字，表示绝不搞特殊。\n\n朱德与毛泽东共同指挥了龙源口战斗、黄洋界保卫战等重要战役，取得了辉煌战果。他丰富的军事经验和卓越的指挥才能，为井冈山革命根据地的巩固和发展作出了重大贡献。\n\n\"朱德的扁担\"故事，成为红军官兵一致、同甘共苦的象征，激励着一代又一代革命者。朱德在井冈山的表现，体现了一名共产党员的崇高品质和优良作风。"},{"id":3,"name":"陈毅","photoUrl":"https://gcore.jsdelivr.net/gh/XiaoWang52037/jinggangshan@main/uploads/figures/1783600591624-705687866.jpg","title":"红四军政治部主任","biography":"陈毅（1901-1972），四川乐至人。无产阶级革命家、军事家、外交家，中国人民解放军创建者和领导人之一，中华人民共和国开国元帅。","jinggangshanStory":"1928年1月，陈毅参与领导湘南起义，创建湘南苏维埃政权。同年4月，与朱德一起率领南昌起义余部和湘南农军到达井冈山，与毛泽东领导的部队胜利会师。\n\n在井冈山期间，陈毅担任红四军政治部主任，负责部队的政治工作。他积极宣传党的政策，组织发动群众，为根据地的建设和发展作出了重要贡献。\n\n陈毅文武双全，不仅作战勇敢，而且诗词歌赋样样精通。他在井冈山写下了许多反映革命斗争生活的诗篇，成为珍贵的革命历史记录。\n\n在艰苦的斗争岁月中，陈毅始终保持着革命乐观主义精神。他常说：\"困难是暂时的，胜利终将属于我们。\"这种坚定的革命信念，鼓舞着身边的每一位战友。\n\n陈毅在井冈山的经历，为他日后成为杰出的革命家和军事家奠定了坚实基础。"},{"id":4,"name":"彭德怀","photoUrl":"","title":"红五军军长","biography":"彭德怀（1898-1974），湖南湘潭人。无产阶级革命家、军事家，中国人民解放军创建者和领导人之一，中华人民共和国开国元帅。","jinggangshanStory":"1928年7月，彭德怀与滕代远、黄公略等领导平江起义，创建中国工农红军第五军。同年12月，彭德怀率领红五军主力到达井冈山，与红四军胜利会师。\n\n彭德怀到达井冈山时，正值敌军对根据地进行严密封锁，形势十分危急。他主动请缨，率部留守井冈山，掩护红四军主力向赣南转移。\n\n在坚守井冈山的战斗中，彭德怀指挥部队与敌军周旋，坚持斗争。由于敌众我寡，红五军遭受较大损失，但彭德怀始终没有放弃，带领残部突围，继续坚持游击战争。\n\n彭德怀的英勇表现，展现了一名共产党员的坚定信念和无畏勇气。他在井冈山的斗争经历，成为其革命生涯中的重要篇章。\n\n后来，彭德怀率部与红四军再次会合，共同开创了中央革命根据地，为中国革命作出了重大贡献。"},{"id":5,"name":"曾志","photoUrl":"https://gcore.jsdelivr.net/gh/XiaoWang52037/jinggangshan@main/uploads/figures/1783600600374-186781741.jpg","title":"红军女战士、党的优秀干部","biography":"曾志（1911-1998），湖南宜章人。1926年加入中国共产党，1928年参加湘南起义，随后上井冈山。她是中国共产党优秀党员，久经考验的忠诚的共产主义战士。","jinggangshanStory":"1928年，年仅17岁的曾志参加了湘南起义，随后跟随朱德、陈毅的部队上了井冈山。在井冈山斗争时期，她担任红四军后方总医院党总支书记。\n\n当时医院条件极其艰苦，缺少药品和医疗器械，伤员们只能躺在稻草铺成的床上。曾志带领医护人员想尽办法救治伤员，用盐水代替消毒液，用竹片代替镊子，用草药代替西药。\n\n有一次，为了抢救一位重伤员，曾志连续三天三夜没有合眼。伤员最终得救，她却累得昏倒在病房里。醒来后的第一句话是：\"伤员怎么样了？\"\n\n在井冈山的艰苦岁月里，曾志不仅要面对敌人的围剿，还要克服物资匮乏的困难。她用自己的实际行动，诠释了一名共产党员的初心和使命。"},{"id":6,"name":"贺子珍","photoUrl":"https://gcore.jsdelivr.net/gh/XiaoWang52037/jinggangshan@main/uploads/figures/1783600606216-958179168.jpg","title":"井冈山第一位女红军","biography":"贺子珍（1910-1984），江西永新人。1926年加入中国共产党，是井冈山革命根据地第一位女红军。她勇敢坚强，被誉为\"永新一枝花\"。","jinggangshanStory":"1927年10月，毛泽东率领秋收起义部队到达井冈山。当时年仅17岁的贺子珍已经是永新县的中共党员和妇女干部。她积极协助红军开展工作，成为井冈山第一位女红军。\n\n贺子珍不仅做群众工作和宣传工作，还参加战斗。在黄洋界保卫战中，她和其他战士一起坚守阵地，向敌人投掷石块，配合红军打退了敌人的进攻。\n\n在井冈山的艰苦岁月里，贺子珍与红军战士们同甘共苦。她学会了打草鞋、编斗笠，常常把自己的口粮省下来给伤员吃。\n\n贺子珍还经常深入农村，向群众宣传革命道理，发动妇女支援红军。在她的带动下，越来越多的井冈山妇女加入到支援革命的行列中，为根据地的发展壮大作出了重要贡献。"},{"id":7,"name":"王尔琢","photoUrl":"https://gcore.jsdelivr.net/gh/XiaoWang52037/jinggangshan@main/uploads/figures/1783600614375-799376260.jpg","title":"红四军参谋长","biography":"王尔琢（1903-1928），湖南石门人。1924年考入黄埔军校第一期，同年加入中国共产党。参加了北伐战争和南昌起义，后随朱德上井冈山，任红四军参谋长兼第二十八团团长。","jinggangshanStory":"王尔琢是井冈山时期红军的重要军事指挥员，被誉为\"红军中的美髯公\"。他作战勇敢，指挥有方，在多次战斗中屡建奇功。\n\n1928年6月的龙源口战斗中，王尔琢率领第二十八团担任主攻任务。面对数倍于己的敌人，他沉着指挥，身先士卒，最终取得了龙源口大捷，歼敌一个团，击溃两个团，成为井冈山斗争时期最大的一次胜利。\n\n然而，1928年8月，在红军主力外出期间，第二十八团二营营长袁崇全叛变投敌。王尔琢为了追回被带走的部队，只身前往劝说，不幸被袁崇全开枪杀害，年仅25岁。\n\n王尔琢牺牲后，红军将士无不悲痛。毛泽东亲自为他起草了挽联：\"一哭尔琢，二哭尔琢，尔琢今已矣，留却重任谁承受？\""},{"id":8,"name":"张子清","photoUrl":"","title":"红军师长、\"红军中的关云长\"","biography":"张子清（1902-1930），湖南益阳人。1920年毕业于湖南讲武堂，1925年加入中国共产党。参加了秋收起义，随毛泽东上井冈山，历任红四军第十一师师长、红五军参谋长等职。","jinggangshanStory":"张子清是井冈山时期著名的红军将领，因作战勇敢、带伤坚持战斗，被誉为\"红军中的关云长\"。\n\n1928年4月的酃县战斗中，张子清左脚踝中弹负伤。由于根据地医疗条件极差，子弹一直未能取出，伤口多次化脓，但他始终带病坚持工作。\n\n有一次，医生要给他动手术取出子弹，却发现没有麻醉药。张子清笑着说：\"关云长刮骨疗毒都不怕，我这点痛算什么？\"他让医生直接用手术刀切开伤口，硬是忍着剧痛完成了手术。\n\n由于伤势过重，张子清的左脚最终不得不截肢。但他并没有因此消沉，仍然积极为红军出谋划策。1930年，张子清因伤势恶化，不幸病逝，年仅28岁。\n\n毛泽东曾深情地说：\"张子清是一个真正的共产党员，是一个英勇的红军指挥员。\""},{"id":9,"name":"伍若兰","photoUrl":"","title":"红军宣传员","biography":"伍若兰（1906-1929），湖南耒阳人。1926年加入中国共产党。1928年参加湘南起义，后上井冈山，从事宣传工作和妇女工作。","jinggangshanStory":"伍若兰是湘南起义中涌现出的杰出女性代表。她出身书香门第，却毅然投身革命。在湘南起义中，她组织妇女支援前线，为红军运送弹药、照顾伤员。\n\n上井冈山后，伍若兰担任了红军的宣传工作。她编写了许多通俗易懂的歌谣和标语，向群众宣传革命道理。她还能双手使枪，在战斗中表现得十分勇敢。\n\n1929年1月，红四军主力向赣南进军途中，在江西寻乌县遭到敌军袭击。伍若兰为了掩护朱德和军部机关转移，主动带领一部分战士吸引敌人火力。\n\n在激烈的战斗中，伍若兰腿部中弹被俘。敌人得知她是朱德的妻子后，软硬兼施，企图从她口中得到红军的情报。但伍若兰坚贞不屈，始终只说一句话：\"若要我和朱德脱离关系，除非日从西方出，赣江水倒流！\"\n\n1929年2月12日，伍若兰英勇就义，年仅23岁。"},{"id":10,"name":"袁文才","photoUrl":"","title":"井冈山农民武装首领","biography":"袁文才（1898-1930），江西宁冈人。井冈山地区农民武装首领，1927年迎接毛泽东上井冈山，为井冈山革命根据地的创建作出了重要贡献。","jinggangshanStory":"袁文才是井冈山地区\"马刀队\"农民武装的首领，在井冈山一带有着很高的威望。1927年10月，毛泽东率领秋收起义部队到达井冈山后，袁文才主动与毛泽东联系，表示欢迎红军上山的诚意。\n\n毛泽东对袁文才以诚相待，送给他100多支枪，帮助他扩大武装力量。袁文才深受感动，积极帮助红军在井冈山站稳脚跟，为根据地的创建和发展作出了重要贡献。\n\n1928年，袁文才的部队编入红四军，他担任红四军第三十二团团长。在保卫井冈山的战斗中，袁文才率领部队英勇作战，多次打退敌人的进攻。\n\n袁文才与王佐是井冈山革命根据地的重要创建者，他们将\"绿林武装\"改造为革命队伍，为井冈山革命根据地的建立提供了重要支持。"},{"id":11,"name":"王佐","photoUrl":"","title":"井冈山农民武装首领","biography":"王佐（1898-1930），江西遂川人。井冈山地区农民武装首领，1927年迎接毛泽东上井冈山，为井冈山革命根据地的创建作出了重要贡献。","jinggangshanStory":"王佐是井冈山地区\"遂川农民自卫军\"的首领，与袁文才一起控制着井冈山一带。1927年10月，毛泽东到达井冈山后，王佐主动欢迎红军上山，并提供物资支持。\n\n毛泽东对王佐同样以诚相待，帮助他训练部队，提高战斗力。王佐深受感动，积极帮助红军开辟根据地，担任向导，提供情报。\n\n1928年，王佐的部队编入红四军，他担任红四军第三十二团副团长。在保卫井冈山的战斗中，王佐利用熟悉地形的优势，带领部队与敌人周旋，为保卫根据地作出了重要贡献。\n\n袁文才与王佐将\"绿林武装\"改造为革命队伍，是井冈山革命根据地的重要创建者。他们的革命精神值得永远铭记。"},{"id":12,"name":"何长工","photoUrl":"","title":"红军政治工作者","biography":"何长工（1900-1987），湖南华容人。1922年加入中国共产党，参加了秋收起义，随毛泽东上井冈山，长期从事红军政治工作和军事教育工作。","jinggangshanStory":"何长工是井冈山时期重要的政治工作者。他跟随毛泽东参加秋收起义，上井冈山后主要从事部队的政治工作和军事教育工作。\n\n何长工善于做群众工作，经常深入农村宣传党的政策，发动群众参加革命。他还负责对袁文才、王佐部队的改造工作，帮助他们提高政治觉悟和军事素质。\n\n在井冈山的艰苦岁月里，何长工始终保持着坚定的革命信念。他常说：\"只要跟着党走，就没有过不去的火焰山。\"这种信念感染着身边的每一位战友。\n\n后来，何长工长期从事军事教育工作，创办了红军学校，为人民军队培养了大批军事政治人才。"},{"id":13,"name":"宛希先","photoUrl":"","title":"红军团党代表","biography":"宛希先（1906-1930），湖北黄梅人。1927年参加秋收起义，随毛泽东上井冈山，任红四军第一团党代表。","jinggangshanStory":"宛希先是井冈山时期优秀的政治工作者。他跟随毛泽东参加秋收起义，是坚定的革命者。\n\n三湾改编后，宛希先担任第一团党代表，负责部队的政治工作。他坚决执行毛泽东的指示，积极宣传党的政策，稳定部队情绪，提高了部队的战斗力。\n\n在井冈山斗争中，宛希先多次参加战斗，英勇作战。他常说：\"革命就要不怕牺牲，共产党人死在哪里都一样光荣。\"\n\n1929年，宛希先在一次战斗中负伤被俘，敌人严刑拷打，企图从他口中得到红军的情报。但宛希先坚贞不屈，始终没有泄露任何机密，最终被敌人杀害，年仅24岁。"},{"id":14,"name":"马奕夫","photoUrl":"","title":"红军医务兵","biography":"马奕夫（1906-1928），江西宁冈人。井冈山斗争时期参加红军，在红军后方总医院担任医务兵。","jinggangshanStory":"马奕夫是井冈山红军后方总医院的一名普通医务兵。在极端艰苦的条件下，他和战友们用简陋的器材救治了大批红军伤员。\n\n1928年冬天，医院来了一位双腿中弹的连长，伤口已经严重感染，如不及时截肢，会有生命危险。但医院没有麻药，也没有正规的手术器械。\n\n马奕夫主动请缨担任手术助手。手术中，他紧紧按住伤员，同时不断地安慰和鼓励他。手术进行了整整两个小时，马奕夫的衣服被汗水湿透，双手因为用力过度而颤抖，但他始终没有松手。\n\n手术成功了，伤员保住了性命。马奕夫却因为过度疲劳，昏倒在手术台旁。醒来后，他说的第一句话是：\"伤员怎么样了？\"\n\n1928年底，在一次敌军偷袭中，马奕夫为了保护伤员转移，不幸中弹牺牲，年仅22岁。他用自己年轻的生命，践行了红军医务工作者的崇高誓言。"},{"id":15,"name":"滕代远","photoUrl":"","title":"红五军党代表","biography":"滕代远（1904-1974），湖南麻阳人。1924年加入中国共产党，1928年与彭德怀一起领导平江起义，任红五军党代表。","jinggangshanStory":"1928年7月，滕代远与彭德怀、黄公略等领导平江起义，创建中国工农红军第五军，滕代远任党代表。\n\n同年12月，滕代远与彭德怀一起率领红五军主力到达井冈山，与红四军胜利会师。在井冈山期间，滕代远负责红五军的政治工作，积极贯彻党的路线方针政策。\n\n当红四军主力向赣南转移时，滕代远与彭德怀一起率部留守井冈山，掩护主力部队转移。在艰难的斗争中，滕代远始终保持着坚定的革命信念。\n\n后来，滕代远长期从事革命工作，为中国人民的解放事业作出了重要贡献。"}];

// 渲染故事列表
function renderStories(){
  var c=document.getElementById('stories');
  var h='';
  stories.forEach(function(s){
    var contentHtml=s.content.split('\n\n').map(function(p){return '<p>'+p.replace(/\n/g,'<br>')+'</p>';}).join('');
    var refsHtml='';
    if(s.references&&s.references.length){
      refsHtml='<div class="refs"><h4>📎 参考资料</h4>';
      s.references.forEach(function(r){
        refsHtml+='<a href="'+r.url+'" target="_blank" rel="noopener">'+r.title+'</a>';
      });
      refsHtml+='</div>';
    }
    h+='<div class="card" data-id="'+s.id+'">'+
      '<div class="card-title"><span class="emoji">📜</span>'+s.title+'</div>'+
      '<div class="card-summary">'+s.summary+'</div>'+
      '<span class="card-toggle" onclick="toggleStory(this)">展开全文</span>'+
      '<div class="card-content">'+contentHtml+refsHtml+'</div>'+
    '</div>';
  });
  c.innerHTML=h;
}

// 渲染表情包列表
function renderMemes(){
  var c=document.getElementById('memes');
  var h='<div class="meme-grid">';
  memes.forEach(function(m){
    var imgHtml = m.img ? '<img src="'+m.img+'" style="width:100%;height:100%;object-fit:cover;display:block" alt="'+m.title+'">' : '<div class="meme-img">😄</div>';
    h+='<div class="meme-card" onclick="showMeme('+m.id+')">'+
      '<div style="width:100%;aspect-ratio:1;background:#f8e8e8;overflow:hidden">'+imgHtml+'</div>'+
      '<div class="meme-label">'+m.title+'</div>'+
    '</div>';
  });
  h+='</div>';
  c.innerHTML=h;
}

// 渲染人物列表
function renderFigures(){
  var c=document.getElementById('figures');
  var h='';
  figures.forEach(function(f){
    var initial=f.name.charAt(0);
    var avatarHtml = f.photoUrl 
      ? '<img src="'+f.photoUrl+'" style="width:48px;height:48px;border-radius:50%;object-fit:cover;flex-shrink:0;margin-right:12px" alt="'+f.name+'">' 
      : '<div class="figure-avatar">'+initial+'</div>';
    var storyHtml=f.jinggangshanStory.split('\n\n').map(function(p){return '<p>'+p.replace(/\n/g,'<br>')+'</p>';}).join('');
    h+='<div class="card" data-id="'+f.id+'" style="padding:0;overflow:hidden">'+
      '<div class="figure-card" onclick="toggleFigure(this)">'+
        avatarHtml+
        '<div class="figure-info">'+
          '<div class="figure-name">'+f.name+'</div>'+
          '<div class="figure-title">'+f.title+'</div>'+
        '</div>'+
      '</div>'+
      '<div class="figure-story">'+storyHtml+'</div>'+
    '</div>';
  });
  c.innerHTML=h;
}

// 展开/收起故事
function toggleStory(el){
  var content=el.nextElementSibling;
  var isOpen=content.classList.contains('show');
  if(isOpen){
    content.classList.remove('show');
    el.classList.remove('open');
    el.textContent='展开全文';
  }else{
    content.classList.add('show');
    el.classList.add('open');
    el.textContent='收起全文';
  }
}

// 展开/收起人物事迹
function toggleFigure(el){
  var story=el.parentElement.querySelector('.figure-story');
  var isOpen=story.classList.contains('show');
  if(isOpen){
    story.classList.remove('show');
  }else{
    story.classList.add('show');
  }
}

// 显示表情包详情
function showMeme(id){
  var m=memes.find(function(x){return x.id===id;});
  if(!m)return;
  document.getElementById('memeDetailTitle').textContent=m.title;
  var imgEl=document.getElementById('memeDetailImg');
  if(m.img){
    imgEl.innerHTML='<img src="'+m.img+'" style="width:100%;height:100%;object-fit:cover;border-radius:8px" alt="'+m.title+'">';
    imgEl.style.background='none';
    imgEl.style.fontSize='0';
  }else{
    imgEl.textContent='😄';
  }
  document.getElementById('memeDetailDesc').textContent=m.description||'暂无描述';
  var histEl=document.getElementById('memeDetailHistory');
  if(m.historyBackground){
    histEl.textContent='📖 历史背景：'+m.historyBackground;
    histEl.style.display='block';
  }else{
    histEl.style.display='none';
  }
  document.getElementById('memeDetail').classList.add('show');
  document.body.style.overflow='hidden';
}

// 关闭表情包详情
function closeMeme(){
  document.getElementById('memeDetail').classList.remove('show');
  document.body.style.overflow='';
}

// 点击遮罩关闭
document.getElementById('memeDetail').addEventListener('click',function(e){
  if(e.target===this)closeMeme();
});

// Tab切换
document.querySelectorAll('.tab').forEach(function(tab){
  tab.addEventListener('click',function(){
    document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
    document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active');});
    this.classList.add('active');
    document.getElementById(this.dataset.tab).classList.add('active');
    window.scrollTo({top:0,behavior:'smooth'});
  });
});

// 回到顶部按钮
window.addEventListener('scroll',function(){
  var btn=document.getElementById('backTop');
  if(window.scrollY>300){
    btn.classList.add('show');
  }else{
    btn.classList.remove('show');
  }
});

// 初始化
renderStories();
renderMemes();
renderFigures();
</script>
</body>
</html>
